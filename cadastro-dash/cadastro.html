<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base-url" content="" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="src/styles/cadastro.css?v=20260309-4" />
    <title>Criar conta</title>
  </head>
  <body class="page-cadastro">
    <main id="form_container">
      <div id="form_header">
        <h1 id="form_title">Criar conta</h1>
        <a
          class="btn-default"
          href="../login-dash/login.html"
          aria-label="Voltar para login"
          title="Voltar para login"
        >
          <i class="fa-solid fa-right-to-bracket"></i>
        </a>
      </div>
      <p class="form-subtitle">
        Preencha os dados abaixo para começar seu controle financeiro.
      </p>

      <form
        id="form"
        action="salvar"
        method="POST"
        data-api-prefix="/.netlify/functions/"
        data-success-redirect="../index.html"
      >
        <div id="input_container">
          <section class="form-section">
            <h2 class="section-title">
              <i class="fa-regular fa-id-card"></i>
              Dados pessoais
            </h2>

            <div class="section-grid">
              <div class="input-box">
                <label for="name" class="form-label"> Primeiro nome </label>
                <div class="input-field">
                  <input
                    type="text"
                    name="name"
                    id="name"
                    class="form-control"
                    placeholder="Nome"
                    required
                  />
                  <i class="fa-regular fa-user"></i>
                </div>
                <span class="error"></span>
              </div>

              <div class="input-box">
                <label for="last_name" class="form-label"> Último nome </label>
                <div class="input-field">
                  <input
                    type="text"
                    name="last_name"
                    id="last_name"
                    class="form-control"
                    placeholder="De Tal"
                    required
                  />
                  <i class="fa-regular fa-user"></i>
                </div>
                <span class="error"></span>
              </div>

              <div class="input-box span-2">
                <label for="birthdate" class="form-label"> Nascimento </label>
                <div class="input-field">
                  <input
                    type="date"
                    name="birthdate"
                    id="birthdate"
                    class="form-control"
                    required
                  />
                </div>
                <span class="error"></span>
              </div>

              <div class="radio-container span-2">
                <fieldset class="gender-fieldset">
                  <legend class="form-label">Gênero</legend>

                  <div id="gender_inputs">
                    <div class="radio-box">
                      <input
                        type="radio"
                        name="gender"
                        id="gender_feminino"
                        value="feminino"
                        required
                      />
                      <label for="gender_feminino" class="form-label">Feminino</label>
                    </div>

                    <div class="radio-box">
                      <input
                        type="radio"
                        name="gender"
                        id="gender_masculino"
                        value="masculino"
                      />
                      <label for="gender_masculino" class="form-label">Masculino</label>
                    </div>

                    <div class="radio-box">
                      <input
                        type="radio"
                        name="gender"
                        id="gender_outro"
                        value="outro"
                      />
                      <label for="gender_outro" class="form-label">Outro</label>
                    </div>

                    <div class="radio-box">
                      <input
                        type="radio"
                        name="gender"
                        id="gender_nao_informado"
                        value="nao_informado"
                      />
                      <label for="gender_nao_informado" class="form-label">
                        Prefiro não informar
                      </label>
                    </div>
                  </div>
                </fieldset>

                <span class="error"></span>
              </div>
            </div>
          </section>

          <section class="form-section">
            <h2 class="section-title">
              <i class="fa-solid fa-shield-heart"></i>
              Dados de acesso
            </h2>

            <div class="section-grid">
              <div class="input-box span-2">
                <label for="email" class="form-label"> E-mail </label>
                <div class="input-field">
                  <input
                    type="email"
                    name="email"
                    id="email"
                    class="form-control"
                    placeholder="exemplo@gmail.com"
                    required
                  />
                  <i class="fa-regular fa-envelope"></i>
                </div>
                <span class="error"></span>
              </div>

              <div class="input-box">
                <label for="password" class="form-label"> Senha </label>
                <div class="input-field">
                  <input
                    type="password"
                    name="password"
                    id="password"
                    class="form-control"
                    placeholder="*******"
                    required
                  />
                  <i class="fa-regular fa-eye-slash password-icon"></i>
                </div>
                <span class="error"></span>
              </div>

              <div class="input-box">
                <label for="confirm_password" class="form-label">
                  Confirmar senha
                </label>
                <div class="input-field">
                  <input
                    type="password"
                    name="confirm_password"
                    id="confirm_password"
                    class="form-control"
                    placeholder="*******"
                    required
                  />
                  <i class="fa-regular fa-eye-slash password-icon"></i>
                </div>
                <span class="error"></span>
              </div>
            </div>
          </section>
        </div>

        <div class="submit-row">
          <button type="submit" class="btn-default">
            <i class="fa-solid fa-check"></i>
            Criar conta
          </button>
          <p class="helper-link">
            Já tem uma conta?
            <a href="../login-dash/login.html">Entrar</a>
          </p>
        </div>
      </form>
    </main>

    <script src="../src/js/runtime-config.js?v=20260309-2"></script>
    <script src="src/javascript/cadastro.js?v=20260309-4"></script>
  </body>
</html>
