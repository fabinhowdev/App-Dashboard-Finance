<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Dashboard</title>

    <link rel="stylesheet" href="dash.css" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="color-text">
        <h1>💰 Finance Dashboard</h1>
        <p id="welcome_user" class="welcome-user"></p>
      </div>

      <div class="card">
        <h3>Saldo: <span id="balance">R$ 0.00</span></h3>
      </div>

      <div class="card">
        <form id="form" aria-label="Adicionar transação">
          <label for="description">Descrição</label>
          <input
            type="text"
            id="description"
            placeholder="Descrição"
            required
          />

          <label for="amount">Valor (R$)</label>
          <input
            type="number"
            id="amount"
            placeholder="Valor"
            min="0.01"
            step="0.01"
            inputmode="decimal"
            required
          />

          <label for="type">Tipo</label>
          <select id="type">
            <option value="income">Receita</option>
            <option value="expense">Despesa</option>
          </select>

          <button type="submit">Adicionar</button>
        </form>
      </div>

      <div class="card">
        <canvas id="chart"></canvas>
      </div>

      <div class="card">
        <ul id="list"></ul>
      </div>
    </div>
    <button id="logout_btn" class="logout" type="button">Sair</button>

    <script type="module" src="script.js?v=20260308-1"></script>
  </body>
</html>
