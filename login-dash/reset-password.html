<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base-url" content="" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../cadastro-dash/src/styles/cadastro.css?v=20260309-4" />
    <title>Redefinir senha</title>
  </head>
  <body>
    <main id="form_container">
      <div id="form_header">
        <h1 id="form_title">Redefinir senha</h1>
        <a
          class="btn-default"
          href="login.html"
          aria-label="Voltar para login"
          title="Voltar para login"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </div>
      <p class="form-subtitle">
        Defina uma nova senha segura para continuar usando sua conta.
      </p>

      <form id="reset_form" data-api-prefix="/.netlify/functions/">
        <input type="hidden" name="token" id="token" />

        <div id="input_container">
          <div class="input-box">
            <label for="password" class="form-label">Nova senha</label>
            <div class="input-field">
              <input
                type="password"
                name="password"
                id="password"
                class="form-control"
                placeholder="*******"
                required
              />
              <i class="fa-regular fa-eye-slash password-icon"></i>
            </div>
            <span class="error"></span>
          </div>

          <div class="input-box">
            <label for="confirm_password" class="form-label">
              Confirmar nova senha
            </label>
            <div class="input-field">
              <input
                type="password"
                name="confirm_password"
                id="confirm_password"
                class="form-control"
                placeholder="*******"
                required
              />
              <i class="fa-regular fa-eye-slash password-icon"></i>
            </div>
            <span class="error"></span>
          </div>
        </div>

        <button type="submit" class="btn-default">
          <i class="fa-solid fa-key"></i>
          Atualizar senha
        </button>

        <p id="status_message" class="status-message" aria-live="polite"></p>
      </form>
    </main>

    <script src="../src/js/runtime-config.js?v=20260309-2"></script>
    <script type="module" src="../src/js/reset-password.js?v=20260309-2"></script>
  </body>
</html>
