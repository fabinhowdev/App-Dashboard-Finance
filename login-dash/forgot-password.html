<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="api-base-url" content="" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../cadastro-dash/src/styles/cadastro.css?v=20260308-3" />
    <title>Esqueci a senha</title>
  </head>
  <body>
    <main id="form_container">
      <div id="form_header">
        <h1 id="form_title">Esqueci a senha</h1>
        <a
          class="btn-default"
          href="login.html"
          aria-label="Voltar para login"
          title="Voltar para login"
        >
          <i class="fa-solid fa-arrow-left"></i>
        </a>
      </div>
      <p class="form-subtitle">
        Digite o e-mail da sua conta para receber o link de redefinição.
      </p>

      <form id="forgot_form" data-api-prefix="../">
        <div id="input_container">
          <div class="input-box">
            <label for="email" class="form-label">E-mail da conta</label>
            <div class="input-field">
              <input
                type="email"
                name="email"
                id="email"
                class="form-control"
                placeholder="exemplo@gmail.com"
                required
              />
              <i class="fa-regular fa-envelope"></i>
            </div>
            <span class="error"></span>
          </div>
        </div>

        <button type="submit" class="btn-default">
          <i class="fa-solid fa-paper-plane"></i>
          Enviar link
        </button>

        <p id="status_message" class="status-message" aria-live="polite"></p>
        <p id="debug_link_container" class="status-message debug-link"></p>
      </form>
    </main>

    <script src="../src/js/runtime-config.js?v=20260309-1"></script>
    <script type="module" src="../src/js/forgot-password.js?v=20260309-1"></script>
  </body>
</html>
